name: Smart Scale Connect Garmin DI
version: "0.4.4-garmin-di-config"
slug: smart_scale_connect_garmin_di
description: SmartScaleConnect with patched Garmin DI OAuth2 authorization
url: "https://github.com/alexanderznamensky/home-assistant-addons/tree/main/smart-scale-connect"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
map:
  - addon_config:rw
options:
  sleep: "24h"
  scaleconnect_yaml: |
    # Example:
    #
    # sync_picooc_to_garmin:
    #   from: picooc picooc@example.com picooc-password
    #   to: garmin garmin@example.com garmin-password
    #
    # sync_from_garmin_1:
    #   from: garmin garmin@example.com garmin-password
    #   to: picooc picooc@example.com picooc-password
schema:
  sleep: str
  scaleconnect_yaml: str
